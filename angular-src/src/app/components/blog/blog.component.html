<div class="page page--no-skew">
  <ul class="blogs">
    <li *ngFor="let blog of blogPosts" class="blog">
      <div>
        <h2>{{blog.locationPosted}}</h2>
        <p>{{blog.blogBody}}</p>
        <p>{{blog.posted | date: ddMMyyyy}}</p>
        <p>{{blog.createdBy}}</p>
      </div>
      <hr>
    </li>
  </ul>
</div>
