<main class="page admin">
  <div class="bg bg--contrast admin__loggedin">
    <p>Logged in as: {{name}}</p>
    <a class="admin__logout" role="button" class="btn btn--inverted" (click)="onLogoutClick()">Log Out</a>
  </div>
  <div class="tabbed">
    <nav>
      <ul class="tabbed__tabs">
        <li [class.active]="blogActive">
          <a (click)="blogActive = !blogActive">Blog Entry</a>
        </li>
        <li [class.active]="!blogActive">
          <a (click)="blogActive = !blogActive">Accept Feedback</a>
        </li>
      </ul>
    </nav>

    <div class="tabbed__panel-w  bg bg--opaque">
      <section [class.active]="blogActive" class="tabbed__panel">
        <div class="blog-entry">
          <h1>Enter new blog post</h1>
          <!-- Custom Success/Error Message -->

          <!-- <div [ngClass]="messageClass">
            {{ message }}
          </div> -->

          <form [formGroup]="form" class="form" (submit)="onBlogSubmit()">
            <div class="form__input">
              <label for="file" class="btn btn--regular">Choose a photo</label>
              <input class="srt" id="file" type="file" name="imgUrl" value="Choose Photo" formControlName="imgUrl">
            </div>
            <div class="form__input">
              <label for="description" class="srt">Enter a brief description of the job</label>
              <textarea name="blogBody" id="description" cols="30" rows="6" class="description form__text-input" placeholder="Enter a brief description of the job" formControlName="blogBody"></textarea>
            </div>
            <div class="form__input">
              <!-- <div [ngClass]="{'has-success': form.controls.valid, 'has-error': form.contols.locationPosted.dirty && form.controls.locationPosted.errors}"> -->
              <input type="text" name="locationPosted" class="form__text-input" placeholder="Where was the job?" formControlName="locationPosted">
              <!-- </div> -->
            </div>
            <input [disabled]="processing" class="btn btn--regular" type="submit" value="Post">
          </form>
        </div>
      </section>

      <section [class.active]="!blogActive" class="tabbed__panel">
        <div class="accept-feedback">
          <h1>Accept Feedback Posts</h1>
          <p>You have <span>'enter number of posts to accept'</span> feedback requests to be verified.</p>
          <ul class="verify">
            <!-- <li *ngFor="let testimonial of testimonials">
              <div>
                <h2>Posted by: {{ testimonial.author }}</h2>
              </div>
              <div>
                <h3>Post</h3>
                <p>
                  {{ testimonial.body }}
                </p>
              </div>
              <button class="btn btn--accept" type="button">Accept</button>
              <button class="btn btn--decline" type="button">Decline</button>
            </li> -->
          </ul>
        </div>
      </section>
    </div>
  </div>
</main>
